<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Merci - RetentionFlow AI</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin: 0;
  font-family: sans-serif;
  background: #0f172a;
  color: white;
  display: flex;
  align-items: center;
  justify-content: center;
  height: 100vh;
  text-align: center;
}

.card {
  max-width: 600px;
  padding: 40px;
  background: rgba(255,255,255,0.05);
  border-radius: 16px;
}

h1 {
  font-size: 40px;
  margin-bottom: 10px;
}

p {
  color: #cbd5e1;
  font-size: 18px;
  line-height: 1.5;
}

.badge {
  display: inline-block;
  margin-top: 20px;
  padding: 8px 14px;
  background: #22c55e;
  border-radius: 999px;
  font-size: 14px;
}

.button {
  margin-top: 30px;
  display: inline-block;
  padding: 12px 20px;
  background: #38bdf8;
  color: black;
  border-radius: 10px;
  text-decoration: none;
  font-weight: bold;
}
</style>
</head>

<body>

<div class="card">

  <div class="badge">✔ Envoi confirmé</div>

  <h1>Merci !</h1>

  <p>
    Ton script est maintenant entre les mains de notre IA.<br>
    Nous analysons les 3 premières secondes, le rythme et la rétention.
  </p>

  <p>
    Tu vas recevoir ton analyse très bientôt par email.
  </p>

  <a class="button" href="/">
    Retour à l’accueil
  </a>

</div>
<script>
setTimeout(() => {
  document.querySelector(".badge").innerText = "Analyse en cours...";
}, 1500);
</script>
</body>
</html>
