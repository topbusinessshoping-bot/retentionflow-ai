<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RetentionFlow AI - App</title>

<style>
body{
  margin:0;
  font-family:sans-serif;
  background:radial-gradient(circle at top,#0f172a,#020617);
  color:white;
  text-align:center;
}

.container{
  max-width:700px;
  margin:auto;
  padding:80px 20px;
}

.card{
  background:#111827;
  padding:40px;
  border-radius:16px;
}

textarea{
  width:100%;
  height:180px;
  padding:15px;
  border-radius:10px;
  border:none;
  resize:none;
}

button{
  margin-top:15px;
  padding:15px 25px;
  background:#38bdf8;
  border:none;
  border-radius:10px;
  font-weight:bold;
  cursor:pointer;
}

.bar{
  width:200px;
  height:6px;
  background:#1e293b;
  margin:20px auto;
  border-radius:10px;
  overflow:hidden;
}

.bar div{
  height:100%;
  width:0%;
  background:#38bdf8;
}
</style>

</head>

<body>

<div class="container">

  <h1>Analyse ton script</h1>

  <p style="color:#94a3b8;">
    Colle ton script et reçois une analyse IA instantanée
  </p>
  <p style="color:#64748b;">
  Analyse basée sur des modèles de rétention YouTube
  </p>
  <div class="card">

    <textarea id="script" placeholder="Colle ton script ici..."></textarea>

    <br>

    <button onclick="analyze()">
      🚀 Analyser
    </button>

    <div class="bar">
      <div id="bar"></div>
    </div>

    <div id="result" style="display:none;margin-top:20px;">
      <h2>Résultat IA</h2>
      <h1 id="score">0%</h1>
      <p id="feedback"></p>
    </div>

  </div>

</div>

<script>
function analyze(){

  const text = document.getElementById("script").value.toLowerCase();
  // 🔴 Détection répétition abusive
const words = text.split(" ");
const uniqueWords = new Set(words);

if (words.length > 0 && (uniqueWords.size / words.length) < 0.4) {
  score = 40;
  feedback.innerText = "❌ Script invalide : trop de répétitions, manque de contenu réel.";
  
  result.style.display = "block";
  scoreEl.innerText = "40%";
  return;
}
  // 🔴 trop court
if (text.split(" ").length < 8) {
  score = 45;
  feedback.innerText = "⚠️ Script trop court pour générer une bonne rétention.";
  
  result.style.display = "block";
  scoreEl.innerText = "45%";
  return;
}
  const bar = document.getElementById("bar");
  const result = document.getElementById("result");
  const scoreEl = document.getElementById("score");
  const feedback = document.getElementById("feedback");

  if(text.length < 20){
    alert("Ton script est trop court pour être analysé.");
    return;
  }

  // 🔄 animation barre
  let progress = 0;
  const anim = setInterval(()=>{
    progress += 10;
    bar.style.width = progress + "%";
    if(progress >= 100) clearInterval(anim);
  },100);

  // 🧠 ANALYSE INTELLIGENTE

  let score = 50;

  // longueur
  if(text.length > 200) score += 10;
  if(text.length > 400) score += 10;

  // hook (mots d’accroche)
  if(text.includes("tu") || text.includes("vous")) score += 10;
  if(text.includes("?")) score += 10;

  // storytelling
  if(text.includes("mais") || text.includes("alors")) score += 10;

  // CTA
  if(text.includes("abonne") || text.includes("like")) score += 5;

  // pénalité si trop court
  if(text.length < 100) score -= 10;

  // limite score
  if(score > 95) score = 95;
  if(score < 40) score = 40;

  setTimeout(()=>{

    result.style.display = "block";

    // 🎯 animation score
    let current = 0;
    const smooth = setInterval(()=>{
      current++;
      scoreEl.innerText = current + "%";
      if(current >= score) clearInterval(smooth);
    },15);

    // 🧠 FEEDBACK INTELLIGENT

    if(score < 60){
      feedback.innerText = "⚠️ Ton script manque d'accroche. Ajoute une question ou une tension dès le début.";
    }
    else if(score < 75){
      feedback.innerText = "🟡 Bon script, mais le rythme peut être amélioré pour garder l’attention.";
    }
    else{
      feedback.innerText = "🟢 Très bon script ! Structure engageante et bon potentiel de rétention.";
    }

  },1200);
}
</script>

</body>
</html>
