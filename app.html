<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RetentionFlow AI - App</title>

<style>
body{
  margin:0;
  font-family:sans-serif;
  background:radial-gradient(circle at top,#0f172a,#020617);
  color:white;
  text-align:center;
}

.container{
  max-width:700px;
  margin:auto;
  padding:80px 20px;
}

.card{
  background:#111827;
  padding:40px;
  border-radius:16px;
}

textarea{
  width:100%;
  height:180px;
  padding:15px;
  border-radius:10px;
  border:none;
  resize:none;
}

button{
  margin-top:15px;
  padding:15px 25px;
  background:#38bdf8;
  border:none;
  border-radius:10px;
  font-weight:bold;
  cursor:pointer;
}

.bar{
  width:200px;
  height:6px;
  background:#1e293b;
  margin:20px auto;
  border-radius:10px;
  overflow:hidden;
}

.bar div{
  height:100%;
  width:0%;
  background:#38bdf8;
}
</style>

</head>

<body>

<div class="container">

  <h1>Analyse ton script</h1>

  <p style="color:#94a3b8;">
    Colle ton script et reçois une analyse IA instantanée
  </p>
  <p style="color:#64748b;">
  Analyse basée sur des modèles de rétention YouTube
  </p>
  <div class="card">

    <textarea id="script" placeholder="Colle ton script ici..."></textarea>

    <br>

    <button onclick="analyze()">
      🚀 Analyser
    </button>

    <div class="bar">
      <div id="bar"></div>
    </div>

    <div id="result" style="display:none;margin-top:20px;">
      <h2>Résultat IA</h2>
      <h1 id="score">0%</h1>
      <p id="feedback"></p>
    </div>

  </div>

</div>

<script>
function analyze(){

  const text = document.getElementById("script").value.toLowerCase();
  // 🌍 Détection langue
const isArabic = /[\u0600-\u06FF]/.test(text);
const isLatin = /^[a-zàâçéèêëîïôûùüÿñæœ\s.,!?'"-]+$/.test(text);
  if (!isArabic && !isLatin) {
  result.style.display = "block";
  scoreEl.innerText = "0%";
  feedback.innerText = "🌍 Langue non supportée. Utilise français, anglais ou arabe.";
  return;
}
  // 🔴 Détection répétition abusive
const words = text.split(" ");
const uniqueWords = new Set(words);

if (words.length > 0 && (uniqueWords.size / words.length) < 0.4) {
  score = 40;
  feedback.innerText = "❌ Script invalide : trop de répétitions, manque de contenu réel.";
  
  result.style.display = "block";
  scoreEl.innerText = "40%";
  return;
}
  // 🔴 trop court
if (text.split(" ").length < 8) {
  score = 45;
  feedback.innerText = "⚠️ Script trop court pour générer une bonne rétention.";
  
  result.style.display = "block";
  scoreEl.innerText = "45%";
  return;
}
  const bar = document.getElementById("bar");
  const result = document.getElementById("result");
  const scoreEl = document.getElementById("score");
  const feedback = document.getElementById("feedback");
  const words = text.split(" ");
  // 🔴 Détection texte incohérent (nonsense)
const cleanWords = words.filter(w => w.length > 2);

// ratio de mots "normaux"
const validWords = cleanWords.filter(w => /^[a-zàâçéèêëîïôûùüÿñæœ]+$/.test(w));

if (cleanWords.length > 0 && (validWords.length / cleanWords.length) < 0.5) {
  result.style.display = "block";
  scoreEl.innerText = "35%";
  feedback.innerText = "❌ Texte non valide : contenu incohérent ou non interprétable.";
  return;
}

  if(text.length < 20){
    alert("Ton script est trop court pour être analysé.");
    return;
  }

  // 🔄 animation barre
  let progress = 0;
  const anim = setInterval(()=>{
    progress += 10;
    bar.style.width = progress + "%";
    if(progress >= 100) clearInterval(anim);
  },100);

  // 🧠 ANALYSE INTELLIGENTE

  let score = 50;

// 🇫🇷 / 🇬🇧
if (isLatin) {

  if (text.length > 200) score += 10;
  if (text.length > 400) score += 10;

  if (text.includes("tu") || text.includes("vous") || text.includes("you")) score += 10;
  if (text.includes("?")) score += 10;

  if (text.includes("mais") || text.includes("alors") || text.includes("but") || text.includes("so")) score += 10;

  if (text.includes("abonne") || text.includes("like") || text.includes("subscribe")) score += 5;

}

// 🇸🇦 ARABE
if (isArabic) {

  if (text.length > 200) score += 10;
  if (text.length > 400) score += 10;

  // hook arabe
  if (text.includes("هل") || text.includes("أنت")) score += 10;

  // tension
  if (text.includes("لكن") || text.includes("ولكن")) score += 10;

  // CTA
  if (text.includes("اشترك") || text.includes("لايك")) score += 5;

}

  setTimeout(()=>{

    result.style.display = "block";

    // 🎯 animation score
    let current = 0;
    const smooth = setInterval(()=>{
      current++;
      scoreEl.innerText = current + "%";
      if(current >= score) clearInterval(smooth);
    },15);
      // 🎯 FEEDBACK ICI
  if (score < 60){
    feedback.innerText = isArabic
      ? "⚠️ المقدمة ضعيفة، حاول إضافة سؤال أو جذب الانتباه"
      : "⚠️ Ton script manque d'accroche.";
  }
  else if (score < 75){
    feedback.innerText = isArabic
      ? "🟡 جيد لكن يمكن تحسين الإيقاع"
      : "🟡 Bon script, mais améliorable.";
  }
  else{
    feedback.innerText = isArabic
      ? "🟢 سكريبت قوي مع احتفاظ جيد بالمشاهدين"
      : "🟢 Très bon script !";
  }

  },1200);
}
</script>

</body>
</html>
